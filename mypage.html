<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>마이 페이지</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .page-header {
      background: #fff;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header h2 {
      font-size: 20px;
      font-weight: 500;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
    }

    /* 프로필 영역 */
    .profile {
      background: #fff;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #eee;
    }
    .profile-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #111;
      flex-shrink: 0;
    }
    .profile-info {
      font-size: 15px;
      color: #555;
      line-height: 1.8;
    }
    .profile-info strong {
      color: #111;
      font-weight: 500;
    }

    /* 메뉴 리스트 */
    .menu-list {
      background: #fff;
      margin-top: 12px;
    }
    .menu-item {
      padding: 18px 24px;
      font-size: 16px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-item:active { background: #f5f5f5; }

    /* 하단 버튼 */
    .bottom-area {
      padding: 24px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      padding: 12px 32px;
      border: 1.5px solid #111;
      border-radius: 8px;
      background: #fff;
      font-size: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { background: #f0f0f0; }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      width: 85%;
      text-align: center;
    }
    .modal h3 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 10px;
    }
    .modal p {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
    }
    .modal-btn {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #111;
      border-radius: 8px;
      background: #fff;
      font-size: 15px;
      cursor: pointer;
    }
    .modal-btn:active { background: #f0f0f0; }
  </style>
</head>
<body>

  <div class="page-header">
    <h2>마이 페이지</h2>
    <button class="back-btn" onclick="location.href='index.html'">←</button>
  </div>

  <!-- 로그인 전 프로필 -->
  <div class="profile" id="profile-guest">
    <div class="profile-circle"></div>
    <div class="profile-info">로그인 후 이용해주세요.</div>
  </div>

  <!-- 로그인 후 프로필 -->
  <div class="profile" id="profile-user" style="display:none;">
    <div class="profile-circle"></div>
    <div class="profile-info">
      <div>학번: <strong id="user-id">-</strong></div>
      <div>이름: <strong id="user-name">-</strong>님</div>
    </div>
  </div>

  <!-- 메뉴 -->
  <div class="menu-list">
    <div class="menu-item">시간표 수정</div>
    <div class="menu-item">메뉴 선호도 설정</div>
    <div class="menu-item">피드백 전송</div>
  </div>

  <!-- 로그인 전 버튼 -->
  <div class="bottom-area" id="btn-guest">
    <button class="btn" onclick="openModal('login')">로그인</button>
    <button class="btn" onclick="openModal('signup')">회원가입</button>
  </div>

  <!-- 로그인 후 버튼 -->
  <div class="bottom-area" id="btn-user" style="display:none;">
    <button class="btn" onclick="logout()">로그아웃</button>
  </div>

  <!-- 임시 모달 -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <h3 id="modal-title">로그인</h3>
      <p id="modal-desc">해당 기능은 추후 연결 예정입니다.</p>
      <button class="modal-btn" onclick="closeModal()">확인</button>
    </div>
  </div>

  <script>
    function openModal(type) {
      document.getElementById('modal-title').textContent = type === 'login' ? '로그인' : '회원가입';
      document.getElementById('modal-overlay').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('show');
    }

    function closeModalOutside(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    function logout() {
      document.getElementById('profile-user').style.display = 'none';
      document.getElementById('profile-guest').style.display = 'flex';
      document.getElementById('btn-user').style.display = 'none';
      document.getElementById('btn-guest').style.display = 'flex';
    }
  </script>
</body>
</html>
