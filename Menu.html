<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>메뉴 추천</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
    }

    .page-header {
      background: #fff;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header h2 { font-size: 20px; font-weight: 500; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .timetable-btn {
      padding: 6px 14px;
      border: 1.5px solid #111;
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    .home-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .date-bar {
      background: #fff;
      padding: 10px 24px;
      text-align: right;
      font-size: 15px;
      color: #555;
      border-bottom: 1px solid #eee;
    }

    .content { padding: 16px; padding-bottom: 32px; }

    .meal-card {
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #ddd;
      padding: 18px 20px;
      margin-bottom: 14px;
    }
    .meal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .meal-title {
      font-size: 20px;
      font-weight: 500;
    }
    .meal-time {
      font-size: 14px;
      color: #888;
      margin-left: auto;
    }
    .meal-items {
      font-size: 15px;
      color: #444;
      line-height: 1.8;
    }

    /* 식사별 색상 */
    .breakfast .meal-title { color: #e53935; }
    .lunch .meal-title { color: #f57f17; }
    .dinner .meal-title { color: #1565c0; }
  </style>
</head>
<body>

  <div class="page-header">
    <h2>메뉴 추천</h2>
    <div class="header-right">
      <button class="timetable-btn" onclick="location.href='timetable.html'">시간표</button>
      <button class="home-btn" onclick="location.href='index.html'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H15v-5h-6v5H4a1 1 0 0 1-1-1V9.5z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="date-bar" id="date-bar"></div>

  <div class="content" id="meal-content"></div>

  <script>
    // 오늘 날짜 표시
    const days = ['일', '월', '화', '수', '목', '금', '토'];
    const today = new Date();
    const dateStr = (today.getMonth() + 1) + '월 ' + today.getDate() + '일 ' + days[today.getDay()] + '요일';
    document.getElementById('date-bar').textContent = dateStr;

    // 임시 메뉴 데이터 (나중에 서버 연결 예정)
    const meals = [
      {
        type: 'breakfast',
        title: '아침',
        emoji: '🌅',
        time: '07:30~09:00',
        items: '모닝브래드종&잼, 스크램블에그, 계절 과일,\n그린샐러드&드레싱, 시리얼&우유'
      },
      {
        type: 'lunch',
        title: '점심',
        emoji: '☀️',
        time: '11:30~13:30',
        items: '소고기콩나물밥&양념장, 미역국,\n청양돌그함땅&케찹, 마늘쫑햄볶음,\n실곤약야채무침, 포기김치'
      },
      {
        type: 'dinner',
        title: '저녁',
        emoji: '🌙',
        time: '17:30~19:30',
        items: '자장덮밥, 달걀국, 칠리탕수육, 연유꽃빵,\n파김치'
      }
    ];

    // 현재 시간 기준으로 순서 정렬
    const hour = today.getHours();
    let order;
    if (hour < 9) {
      order = ['breakfast', 'lunch', 'dinner'];
    } else if (hour < 13) {
      order = ['lunch', 'dinner', 'breakfast'];
    } else {
      order = ['dinner', 'breakfast', 'lunch'];
    }

    const sorted = order.map(t => meals.find(m => m.type === t));
    const container = document.getElementById('meal-content');

    sorted.forEach(meal => {
      const card = document.createElement('div');
      card.className = 'meal-card ' + meal.type;
      card.innerHTML = `
        <div class="meal-header">
          <span class="meal-title">${meal.emoji} ${meal.title}</span>
          <span class="meal-time">${meal.time}</span>
        </div>
        <div class="meal-items">${meal.items.replace(/\n/g, '<br>')}</div>
      `;
      container.appendChild(card);
    });
  </script>
</body>
</html>
