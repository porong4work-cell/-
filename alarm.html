<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>알림</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
    }

    .page-header {
      background: #fff;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header h2 { font-size: 20px; font-weight: 500; }
    .home-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .all-read-btn {
      background: none;
      border: none;
      font-size: 13px;
      color: #3182ce;
      cursor: pointer;
      padding: 4px 0;
    }

    .content { padding: 16px; }

    .notif-card {
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #ddd;
      padding: 16px 18px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .notif-card.unread {
      background: #f0f7ff;
      border-color: #bcd8f5;
    }
    .notif-card:active { opacity: 0.8; }

    .notif-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3182ce;
      flex-shrink: 0;
      margin-top: 6px;
    }
    .notif-dot.hidden { visibility: hidden; }

    .notif-body { flex: 1; }
    .notif-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .notif-desc {
      font-size: 13px;
      color: #888;
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .notif-time {
      font-size: 12px;
      color: #bbb;
    }

    .empty-box {
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #ddd;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h2>알림</h2>
    <div style="display:flex; align-items:center; gap:16px;">
      <button class="all-read-btn" onclick="markAllRead()">모두 읽음</button>
      <button class="home-btn" onclick="location.href='index.html'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H15v-5h-6v5H4a1 1 0 0 1-1-1V9.5z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="content" id="content"></div>

  <script>
    // 임시 알림 데이터 (나중에 서버 연결 예정)
    let notifications = JSON.parse(localStorage.getItem('notifications')) || [
      {
        id: 1,
        type: 'warning',
        title: '3번 세탁기 완료 5분 전',
        desc: '세탁물 수거를 준비해주세요.',
        time: '방금 전',
        read: false
      },
      {
        id: 2,
        type: 'done',
        title: '1번 건조기 완료',
        desc: '건조가 완료되었습니다.',
        time: '10분 전',
        read: false
      },
      {
        id: 3,
        type: 'done',
        title: '2번 세탁기 완료',
        desc: '세탁이 완료되었습니다.',
        time: '어제',
        read: true
      },
    ];

    function saveAndRender() {
      localStorage.setItem('notifications', JSON.stringify(notifications));
      // 홈 화면 파란 점 업데이트
      const hasUnread = notifications.some(n => !n.read);
      localStorage.setItem('hasUnread', hasUnread ? 'true' : 'false');
      render();
    }

    function render() {
      const container = document.getElementById('content');
      container.innerHTML = '';

      if (notifications.length === 0) {
        container.innerHTML = '<div class="empty-box">알림이 없습니다.</div>';
        return;
      }

      notifications.forEach((n, idx) => {
        const card = document.createElement('div');
        card.className = 'notif-card' + (n.read ? '' : ' unread');
        card.innerHTML = `
          <div class="notif-dot${n.read ? ' hidden' : ''}"></div>
          <div class="notif-body">
            <div class="notif-title">${n.title}</div>
            <div class="notif-desc">${n.desc}</div>
            <div class="notif-time">${n.time}</div>
          </div>
        `;
        card.onclick = () => markRead(idx);
        container.appendChild(card);
      });
    }

    function markRead(idx) {
      notifications[idx].read = true;
      saveAndRender();
    }

    function markAllRead() {
      notifications.forEach(n => n.read = true);
      saveAndRender();
    }

    saveAndRender();
  </script>
</body>
</html>
