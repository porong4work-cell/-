<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>내 이용 현황</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
    }

    .page-header {
      background: #fff;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header h2 { font-size: 20px; font-weight: 500; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .timetable-btn {
      padding: 6px 14px;
      border: 1.5px solid #111;
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    .content { padding: 16px; }

    .reservation-card {
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #ddd;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
    }
    .card-info { flex: 1; }
    .card-name {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .card-status {
      font-size: 14px;
      margin-bottom: 4px;
    }
    .card-time {
      font-size: 14px;
      color: #555;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid;
    }
    .status-badge.available { background: #e6f4ea; border-color: #2e7d32; color: #2e7d32; }

    .card-bottom {
      display: flex;
      border-top: 1px solid #eee;
    }
    .card-btn {
      flex: 1;
      padding: 12px;
      background: #fff;
      border: none;
      font-size: 15px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card-btn:active { background: #f5f5f5; }
    .card-btn + .card-btn {
      border-left: 1px solid #eee;
    }
    .card-btn.cancel { color: #c62828; }

    .empty-box {
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #ddd;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #aaa;
    }

    .bottom-area {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 16px;
      background: #f5f5f5;
    }
    .bottom-btn {
      width: 100%;
      padding: 14px;
      border: 1.5px solid #111;
      border-radius: 8px;
      background: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    .bottom-btn:active { background: #f0f0f0; }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      width: 85%;
      text-align: center;
    }
    .modal h3 { font-size: 18px; font-weight: 500; margin-bottom: 10px; }
    .modal p { font-size: 14px; color: #888; margin-bottom: 24px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border: 1.5px solid #111;
      border-radius: 8px;
      background: #fff;
      font-size: 15px;
      cursor: pointer;
    }
    .modal-btn.confirm { background: #111; color: #fff; }
    .modal-btn:active { opacity: 0.8; }
  </style>
</head>
<body>

  <div class="page-header">
    <h2>내 이용 현황</h2>
    <div class="header-right">
      <button class="timetable-btn" onclick="location.href='timetable.html'">시간표</button>
      <button onclick="location.href='index.html'" style="background:none; border:none; cursor:pointer;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H15v-5h-6v5H4a1 1 0 0 1-1-1V9.5z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="content" id="content">
    <div id="reservation-list"></div>
    <div class="empty-box" id="empty-box" style="display:none;">예약한 기기가 없습니다.</div>
  </div>

  <div class="bottom-area">
    <button class="bottom-btn" onclick="location.href='laundry.html'">세탁실 현황</button>
  </div>

  <div class="modal-overlay" id="status-modal" onclick="closeModalOutside(event, 'status-modal')">
    <div class="modal">
      <h3>예약 현황</h3>
      <p>해당 기능은 추후 연결 예정입니다.</p>
      <div class="modal-btns">
        <button class="modal-btn confirm" onclick="closeModal('status-modal')">확인</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="cancel-modal" onclick="closeModalOutside(event, 'cancel-modal')">
    <div class="modal">
      <h3>예약 취소</h3>
      <p>예약을 취소하시겠습니까?</p>
      <div class="modal-btns">
        <button class="modal-btn" onclick="closeModal('cancel-modal')">돌아가기</button>
        <button class="modal-btn confirm" onclick="confirmCancel()">확인</button>
      </div>
    </div>
  </div>

  <script>
    window.onload = function() {
      const reservations = JSON.parse(localStorage.getItem('reservations')) || [];
      const list = document.getElementById('reservation-list');
      const emptyBox = document.getElementById('empty-box');

      if (reservations.length === 0) {
        list.style.display = 'none';
        emptyBox.style.display = 'flex';
      } else {
        renderReservations(reservations);
      }
    };

    function renderReservations(data) {
  const list = document.getElementById('reservation-list');
  list.innerHTML = ''; 
  data.forEach(item => {
    const statusClass = (item.status === 'inuse') ? 'inuse' : 'available';
    const statusText = (item.status === 'inuse') ? '사용 중' : '사용 가능';

    // 기기 종류에 따른 SVG 선택
    const svgIcon = (item.type === 'dryer') ? `
      <svg class="machine-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="84" height="84" rx="6" stroke="#333" stroke-width="3" fill="#fff"/>
        ircle cx="50" cy="52" r="26" stroke="#333" stroke-width="2.5"/>
        ircle cx="50" cy="52" r="20" stroke="#333" stroke-width="2"/>
        lipPath id="dclip-${item.id}">ircle cx="50" cy="52" r="19"/></clipPath>
        <g clip-path="url(#dclip-${item.id})">
          <path d="M34 46 Q40 40 48 46 Q54 52 62 44" stroke="#6ab4f5" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <path d="M34 52 Q42 44 50 50 Q58 56 66 48" stroke="#6ab4f5" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        </g>
      </svg>` : `
      <svg class="machine-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="84" height="84" rx="6" stroke="#333" stroke-width="3" fill="#fff"/>
        ircle cx="50" cy="52" r="26" stroke="#333" stroke-width="2.5"/>
        ircle cx="50" cy="52" r="20" stroke="#333" stroke-width="2"/>
        lipPath id="wclip-${item.id}">ircle cx="50" cy="52" r="20"/></clipPath>
        <rect x="30" y="58" width="40" height="14" fill="#cce8ff" clip-path="url(#wclip-${item.id})"/>
      </svg>`;

    const div = document.createElement('div');
    div.className = 'reservation-card';
    div.id = 'card-' + item.id;
    div.innerHTML = `
      <div class="card-top">
        <div class="card-info">
          <div class="card-name">${item.name}</div>
          <div class="card-status">상태: <span class="status-badge ${statusClass}">${statusText}</span></div>
          <div class="card-time">예약 시간: ${item.slot}</div>
        </div>
        ${svgIcon}
      </div>
      <div class="card-bottom">
        <button class="card-btn" onclick="openStatusModal()">예약 현황</button>
        <button class="card-btn cancel" onclick="openCancelModal(${item.id})">예약 취소</button>
      </div>
    `;
    list.appendChild(div);
  });
    }

    let cancelTargetId = null;
    function openStatusModal() { document.getElementById('status-modal').classList.add('show'); }
    function openCancelModal(id) { cancelTargetId = id; document.getElementById('cancel-modal').classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    function closeModalOutside(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

    function confirmCancel() {
      let reservations = JSON.parse(localStorage.getItem('reservations')) || [];
      reservations = reservations.filter(item => item.id !== cancelTargetId);
      localStorage.setItem('reservations', JSON.stringify(reservations));
      const card = document.getElementById('card-' + cancelTargetId);
      if (card) card.remove();
      closeModal('cancel-modal');
      if (reservations.length === 0) {
        document.getElementById('reservation-list').style.display = 'none';
        document.getElementById('empty-box').style.display = 'flex';
      }
    }
  </script>
</body>
</html>
