<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>내 이용 현황</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
    }

    .page-header {
      background: #fff;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header h2 { font-size: 20px; font-weight: 500; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .timetable-btn {
      padding: 6px 14px;
      border: 1.5px solid #111;
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
    }

    /* 예약 카드 */
    .content { padding: 16px; }

    .reservation-card {
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #ddd;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
    }
    .card-info { flex: 1; }
    .card-name {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .card-status {
      font-size: 14px;
      margin-bottom: 4px;
    }
    .card-time {
      font-size: 14px;
      color: #555;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid;
    }
    .status-badge.available { background: #e6f4ea; border-color: #2e7d32; color: #2e7d32; }
    .status-badge.inuse { background: #fffde7; border-color: #f57f17; color: #f57f17; }

    /* 세탁기/건조기 SVG */
    .machine-icon { width: 70px; height: 70px; flex-shrink: 0; }

    .card-bottom {
      display: flex;
      border-top: 1px solid #eee;
    }
    .card-btn {
      flex: 1;
      padding: 12px;
      background: #fff;
      border: none;
      font-size: 15px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card-btn:active { background: #f5f5f5; }
    .card-btn + .card-btn {
      border-left: 1px solid #eee;
    }
    .card-btn.cancel { color: #c62828; }

    /* 빈 상태 */
    .empty-box {
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #ddd;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #aaa;
    }

    /* 하단 버튼 */
    .bottom-area {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 16px;
      background: #f5f5f5;
    }
    .bottom-btn {
      width: 100%;
      padding: 14px;
      border: 1.5px solid #111;
      border-radius: 8px;
      background: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    .bottom-btn:active { background: #f0f0f0; }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      width: 85%;
      text-align: center;
    }
    .modal h3 { font-size: 18px; font-weight: 500; margin-bottom: 10px; }
    .modal p { font-size: 14px; color: #888; margin-bottom: 24px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border: 1.5px solid #111;
      border-radius: 8px;
      background: #fff;
      font-size: 15px;
      cursor: pointer;
    }
    .modal-btn.confirm { background: #111; color: #fff; }
    .modal-btn:active { opacity: 0.8; }
  </style>
</head>
<body>

  <div class="page-header">
    <h2>내 이용 현황</h2>
    <div class="header-right">
      <button class="timetable-btn" onclick="location.href='timetable.html'">시간표</button>
      <button onclick="location.href='index.html'" style="background:none; border:none; cursor:pointer;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H15v-5h-6v5H4a1 1 0 0 1-1-1V9.5z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="content" id="content">
    <!-- 예약 목
