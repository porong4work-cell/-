<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>예약</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
    }

    .page-header {
      background: #fff;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header h2 { font-size: 20px; font-weight: 500; }
    .home-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .content { padding: 20px 24px; }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #ddd;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }
    .machine-name {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .remain-time {
      font-size: 14px;
      color: #3182ce;
      margin-bottom: 20px;
    }

    /* 시간 그리드 */
    .time-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .time-slot {
      padding: 10px 4px;
      border-radius: 8px;
      border: 1.5px solid #ddd;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      color: #111;
      background: #fff;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .time-slot.booked {
      color: #ccc;
      border-color: #eee;
      background: #fafafa;
      cursor: not-allowed;
    }
    .time-slot.selected {
      background: rgba(49, 130, 206, 0.15);
      border-color: #3182ce;
      color: #3182ce;
      font-weight: 500;
    }
    .time-slot:not(.booked):not(.selected):active {
      background: #f0f0f0;
    }

    /* 예약 버튼 */
    .reserve-btn {
      width: 100%;
      padding: 14px;
      background: #fff;
      border: 1.5px solid #111;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }
    .reserve-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .reserve-btn:not(:disabled):active { background: #f0f0f0; }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      width: 85%;
      text-align: center;
    }
    .modal h3 { font-size: 18px; font-weight: 500; margin-bottom: 10px; }
    .modal p { font-size: 14px; color: #555; margin-bottom: 24px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border: 1.5px solid #111;
      border-radius: 8px;
      background: #fff;
      font-size: 15px;
      cursor: pointer;
    }
    .modal-btn.confirm { background: #111; color: #fff; }
    .modal-btn:active { opacity: 0.8; }
  </style>
</head>
<body>

  <div class="page-header">
    <h2>예약하기</h2>
    <button class="home-btn" onclick="location.href='index.html'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H15v-5h-6v5H4a1 1 0 0 1-1-1V9.5z"/>
      </svg>
    </button>
  </div>

  <div class="content">
    <div class="card">
      <div class="card-label">예약하기</div>
      <div class="machine-name" id="machine-name">-</div>
      <div class="remain-time" id="remain-time"></div>
      <div class="time-grid" id="time-grid"></div>
    </div>
    <button class="reserve-btn" id="reserve-btn" disabled onclick="openModal()">예약</button>
  </div>

  <!-- 확인 모달 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>예약 완료</h3>
      <p id="modal-msg"></p>
      <div class="modal-btns">
        <button class="modal-btn" onclick="closeModal()">취소</button>
        <button class="modal-btn confirm" onclick="confirmReserve()">확인</button>
      </div>
    </div>
  </div>

  <script>
    // URL 파라미터에서 기기 정보 가져오기
    const params = new URLSearchParams(location.search);
    const machineName = params.get('name') || '알 수 없는 기기';
    const remainMin = params.get('remain');
    const machineType = params.get('type') || 'washer';

    document.getElementById('machine-name').textContent = machineName;
    document.getElementById('remain-time').textContent = remainMin
      ? '예상 잔여 시간: ' + remainMin + '분'
      : '예상 잔여 시간: -';

    // 시간 슬롯 생성 (09:00 ~ 20:00, 50분 간격)
    const allSlots = [];
    for (let h = 9; h <= 20; h++) {
      for (let m = 0; m < 60; m += 50) {
        if (h === 20 && m > 0) break;
        const hh = String(h).padStart(2, '0');
        const mm = String(m).padStart(2, '0');
        allSlots.push(hh + ':' + mm);
      }
    }

    // 임시 예약된 슬롯 (나중에 서버 연결 예정)
    const bookedSlots = ['10:40', '11:30', '13:10'];

    let selectedSlot = null;

    const grid = document.getElementById('time-grid');
    allSlots.forEach(slot => {
      const div = document.createElement('div');
      const isBooked = bookedSlots.includes(slot);
      div.className = 'time-slot' + (isBooked ? ' booked' : '');
      div.textContent = slot;
      if (!isBooked) {
        div.onclick = () => selectSlot(slot, div);
      }
      grid.appendChild(div);
    });

    function selectSlot(slot, el) {
      // 기존 선택 해제
      document.querySelectorAll('.time-slot.selected').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      selectedSlot = slot;
      document.getElementById('reserve-btn').disabled = false;
    }

    function openModal() {
      document.getElementById('modal-msg').textContent =
        machineName + ' ' + selectedSlot + '에 예약되었습니다.';
      document.getElementById('modal-overlay').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('show');
    }

    function confirmReserve() {
  // 사용 중(inuse)인지 사용 가능(available)인지 명확하게 구분
  // remainMin이 null이거나, '-' 이거나, 비어있으면 available
  const isAvailable = (remainMin === null || remainMin === 'null' || remainMin === '' || remainMin === '-');
  const status = isAvailable ? 'available' : 'inuse';
  
  const reservations = JSON.parse(localStorage.getItem('reservations')) || [];
  
  reservations.push({
    id: Date.now(),
    name: machineName,
    type: machineType,
    slot: selectedSlot,
    status: status, // 'available' 또는 'inuse'
    remain: remainMin || '-'
  });
  
  localStorage.setItem('reservations', JSON.stringify(reservations));
  location.href = 'Myusage.html';
}
  </script>
</body>
</html>
