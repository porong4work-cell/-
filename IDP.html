<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IDP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #ffffff;
      min-height: 100vh;
    }
    .header {
      position: relative;
      padding: 48px 16px 0;
      background-image: url(https://raw.githubusercontent.com/porong4work-cell/-/main/생활관.png);
      background-size: cover;
      background-position: center;
    }
    .logo-box {
      position: relative;
      border-radius: 8px;
      display: inline-block;
      padding: 16px 28px;
    }
    .logo-box h1 {
      font-size: 48px;
      font-weight: 500;
    }
    .subtitle-box {
      margin-top: 6px;
      position: relative;
      border-radius: 6px;
      display: inline-block;
      padding: 10px 20px;
      font-size: 14px;
    }
    .grid {
      margin-top: 30px;
      padding: 0 24px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .menu-btn {
      border: 2px solid #d0d0d0;
      border-radius: 10px;
      background: #fff;
      padding: 0;
      height: 90px;
      font-size: 14px;
      color: #111;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .menu-btn:active {
      background: #f6f6f6;
    }
    
    .notice {
    padding: 24px 36px 40px;
    }
    .notice-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    }
    .notice-title {
    font-size: 20px;
    font-weight: 500;
    color: #292929;
    }
    .notice-more {
    font-size: 13px;
    color: #888;
    }
    .notice-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-top: 1px solid #eee;
    }
    .notice-text {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
    color: #292929;
    }
    .notice-date {
    font-size: 13px;
    color: #888;
    }
    .notice-new {
    color: #3182ce;
    font-weight: 500;
    }
    
  </style>

</head>
<body>
  <div class="header">
    <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3);"></div>
    <div class="logo-box"><h1 style="line-height: 0.85; font-weight: 500"><span style="font-size: 48px;">Inha</span><br>
        <span style="font-size: 30px;">Dorm Plus</span></h1></div>
    <div class="subtitle-box">생활관 식사 및 공간 이용 불편을 줄이는 생활 지원 앱</div>
  </div>
  <div class="grid">
    <button class="menu-btn" onclick="location.href='laundry.html'">세탁실 현황</button>
    <button class="menu-btn" onclick="navigate('menu')">메뉴 추천</button>
    <button class="menu-btn" onclick="location.href='Myusage.html'">내 이용 현황</button>
    <button class="menu-btn" onclick="location.href='mypage.html'">마이 페이지</button>
  </div>
  
    <div class="notice">
    <div class="notice-header">
      <span class="notice-title">공지사항</span>
    </div>
    <div class="notice-item">
      <div>
        <p class="notice-text">기숙사 세탁실 정기 점검 안내</p>
        <p class="notice-date">2026-04-07 <span class="notice-new">NEW</span></p>
      </div>
    </div>
    <div class="notice-item">
      <div>
        <p class="notice-text">공지사항 제목 2</p>
        <p class="notice-date">2026-03-09</p>
      </div>
    </div>
    <div class="notice-item">
      <div>
        <p class="notice-text">공지사항 제목 3</p>
        <p class="notice-date">2026-02-23</p>
      </div>
    </div>
  </div>

  <script>
    function navigate(page) {
      alert(page + ' 페이지로 이동합니다.');
    }
  </script>
</body>
</html>
